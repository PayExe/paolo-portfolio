<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portfolio de Paolo Antonini - Etudiant en informatique passionne par le developpement web, la cybersecurite et l'IA." />
    <title>Portfolio | Paolo Antonini</title>
    <style>
      html, body {
        background-color: #090912;
        color: #ededf0;
      }
    </style>
    <script>
      (function() {
        var t = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        if (t === 'light') {
          document.body.style.backgroundColor = '#f7f5ff';
          document.body.style.color = '#1a1a2e';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

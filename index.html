    <script>
      (function() {
        var t = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        
        // Apply theme immediately to avoid flash
        if (t === 'light') {
          document.documentElement.style.backgroundColor = '#f7f5ff';
          document.documentElement.style.color = '#1a1a2e';
        } else {
          document.documentElement.style.backgroundColor = '#090912';
          document.documentElement.style.color = '#ededf0';
        }
      })();
    </script>
    <style>
      html {
        background-color: #090912;
        color: #ededf0;
      }
      html[data-theme="light"] {
        background-color: #f7f5ff;
        color: #1a1a2e;
      }
    </style>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>

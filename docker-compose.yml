version: '3.8'

services:
  paolo-portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paolo-portfolio
    ports:
      - "8080:8080"
    environment:
      - VITE_CONTACT_EMAIL=paolo.antonini.dev@gmail.com
      - VITE_APP_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.example.description=Paolo Antonini Portfolio"
